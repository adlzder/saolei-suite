server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # 首页
    location = / {
        try_files /index.html =404;
    }

    # 原生 JS
    location ^~ /native/ {
        try_files $uri $uri/ /native/index.html;
    }

    # Vue - 使用 history 模式路由，需要将所有 /vue/ 下的请求指向 index.html
    location ^~ /vue/ {
        try_files $uri $uri/ /vue/index.html;
    }

    # UniApp 的 /my-h5/ - 同样处理 history 模式路由
    location ^~ /my-h5/ {
        try_files $uri $uri/ /my-h5/index.html;
    }

    # 静态资源缓存设置（可选，提升性能）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
